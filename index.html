<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق المسلم الشامل</title>
    <style>
        :root { --primary: #1a4a4a; --gold: #d4af37; --bg: #fdfaf6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #fdfaf6; margin: 0; padding: 20px; background-image: url('https://www.transparenttextures.com/patterns/arabesque.png'); }
        .app-container { max-width: 450px; margin: auto; background: white; border-radius: 30px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); border: 2px solid var(--gold); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; }
        h2 { color: var(--primary); margin: 0; }
        .quote { text-align: center; font-size: 1.2em; color: var(--gold); margin: 20px 0; font-weight: bold; font-style: italic; }
        .section { margin-top: 20px; padding: 15px; border-radius: 20px; background: #fdfaf6; border: 1px solid #eee; }
        .prayer-time { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #ccc; font-weight: 500; }
        .bell { cursor: pointer; color: var(--primary); font-size: 22px; transition: 0.3s; }
        select { padding: 5px; border-radius: 8px; border: 1px solid var(--gold); margin-bottom: 10px; }
        #dhikrList { max-height: 200px; overflow-y: auto; padding: 10px; font-size: 0.9em; line-height: 1.8; }
        .dhikr-item { padding: 6px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h2 id="title">المسلم الشامل</h2>
        <select id="langSelect" onchange="changeLanguage()">
            <option value="ar">العربية</option>
            <option value="en">English</option>
            <option value="tr">Türkçe</option>
            <option value="hi">हिन्दी</option>
        </select>
    </div>

    <!-- اختيار الدولة -->
    <select id="countrySelect" onchange="getPrayers()">
        <option value="UAE|Ajman">عجمان - الإمارات</option>
        <option value="Saudi Arabia|Riyadh">الرياض - السعودية</option>
        <option value="Syria|Damascus">دمشق - سوريا</option>
        <option value="Turkey|Istanbul">إسطنبول - تركيا</option>
    </select>

    <div class="quote" id="nabiQuote">"لا تنسَ الصلاة على النبي ﷺ"</div>

    <div class="section">
        <h3 id="prayerTitle">مواقيت الصلاة</h3>
        <div id="prayerList"></div>
    </div>

    <div class="section">
        <h3 id="dhikrTitle">أذكار اليوم</h3>
        <div id="dhikrList"></div>
    </div>
</div>

<script>
    const translations = {
        ar: { title: "المسلم الشامل", prayer: "مواقيت الصلاة", dhikr: "أذكار اليوم", quote: "لا تنسَ الصلاة على النبي ﷺ" },
        en: { title: "Muslim App", prayer: "Prayer Times", dhikr: "Daily Athkar", quote: "Don't forget to pray upon the Prophet ﷺ" },
        tr: { title: "Müslüman Uygulaması", prayer: "Namaz Vakitleri", dhikr: "Günlük Zikirler", quote: "Peygamber'e salavat getirmeyi unutma ﷺ" },
        hi: { title: "मुस्लिम ऐप", prayer: "नमाज़ का समय", dhikr: "दैनिक अज़कार", quote: "पैगंबर पर सलाम भेजना न भूलें ﷺ" }
    };

    const dhikrs = ["سبحان الله", "الحمد لله", "لا إله إلا الله", "الله أكبر", "أستغفر الله", "لاحول ولا قوة إلا بالله", "سبحان الله وبحمده", "سبحان الله العظيم", "اللهم صلِ على محمد", "يا حي يا قيوم", "أعوذ بكلمات الله التامات", "بسم الله الذي لا يضر", "رضيت بالله ربا", "حسبي الله لا إله إلا هو", "اللهم إني أسألك علما نافعا", "يا مقلب القلوب ثبت قلبي", "اللهم اغفر لي وارحمني", "أستغفر الله العظيم", "لا إله إلا أنت سبحانك", "اللهم إني أعوذ بك من الهم", "يا رحمن يا رحيم", "لا إله إلا الله وحده", "اللهم أعني على ذكرك", "سبحانك اللهم وبحمدك", "استغفر الله الحي القيوم", "يا ذا الجلال والإكرام", "اللهم إني ظلمت نفسي", "سبحان الله عدد خلقه", "الحمد لله ملء ميزانه", "الله أكبر كبيرا", "لاحول ولا قوة إلا بالله العلي العظيم", "اللهم اجعلني من التوابين", "رب اغفر لي ولوالدي", "يا غفور يا ودود", "اللهم ارزقني الجنة", "لا إله إلا الله الملك الحق", "اللهم افتح لي أبواب رحمتك", "سبحان الله والحمد لله", "أستغفر الله عدد خلقه", "يا فتاح يا عليم", "اللهم بارك لي", "ربي اشرح لي صدري", "اللهم أنت ربي", "سبحان الله وبحمده عدد خلقه", "الحمد لله كما ينبغي", "اللهم إني أعوذ بك من عذاب القبر", "يا رب العالمين", "لا إله إلا الله الملك", "اللهم صل وسلم", "سبحان الله العظيم", "أستغفر الله", "ربي زدني علما", "اللهم اجعل القرآن ربيع قلبي", "يا سميع يا بصير", "اللهم آتنا في الدنيا حسنة", "ربنا لا تزغ قلوبنا", "اللهم إني أسألك الهدى", "سبحانك يا رب", "الحمد لله حمدا كثيرا", "لا إله إلا الله مخلصين", "اللهم ثبت أقدامنا", "يا قوي يا متين", "اللهم إني أعوذ بك من زوال نعمتك", "سبحان الله وبحمده عدد كلماته", "الحمد لله على كل حال", "استغفر الله من كل ذنب", "ربي ارحمهما", "اللهم ارزقني حبك", "يا رزاق يا كريم", "لا إله إلا أنت", "اللهم إني أسألك الجنة", "أعوذ بالله من الشيطان", "يا بديع السماوات", "اللهم صل على محمد", "الحمد لله رب العالمين", "الله أكبر كبيرا", "سبحان الله بكرة وأصيلا", "اللهم إني أعوذ بك من فتنة المحيا", "يا لطيف يا خبير", "اللهم طهر قلبي", "ربنا آتنا من لدنك رحمة", "لا إله إلا الله عدد ما كان", "استغفر الله الذي لا إله إلا هو", "يا غني يا مغني", "اللهم إني أسألك العفو والعافية", "سبحان الله وبحمده رضا نفسه", "الحمد لله الذي بنعمته تتم الصالحات", "اللهم احفظني", "يا هادي يا مهدي", "لا إله إلا الله عدد الحركات", "اللهم صل على نبينا محمد", "سبحان الله والحمد لله", "أستغفر الله وأتوب", "يا واسع المغفرة", "اللهم إني أعوذ بك من النار", "ربي أعوذ بك من همزات الشياطين", "سبحان الله العظيم عدد خلقه", "الحمد لله عدد خلقه", "استغفر الله عدد ذنوبي", "اللهم نور قلبي", "يا نور السماوات والأرض"];

    function playAdhan() { new Audio('https://files.muhammedlhdan.com/adhan/makkah_adhan.mp3').play(); }

    function changeLanguage() {
        const lang = document.getElementById('langSelect').value;
        document.documentElement.dir = (lang === 'ar' || lang === 'hi') ? 'rtl' : 'ltr';
        document.getElementById('title').innerText = translations[lang].title;
        document.getElementById('prayerTitle').innerText = translations[lang].prayer;
        document.getElementById('dhikrTitle').innerText = translations[lang].dhikr;
        document.getElementById('nabiQuote').innerText = translations[lang].quote;
    }

    function formatTime12(time24) {
        let [hours, minutes] = time24.split(':');
        let modifier = hours >= 12 ? ' PM' : ' AM';
        hours = hours % 12 || 12;
        return `${hours}:${minutes}${modifier}`;
    }

    async function getPrayers() {
        const val = document.getElementById('countrySelect').value.split('|');
        const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${val[1]}&country=${val[0]}&method=4`);
        const data = await res.json();
        const t = data.data.timings;
        const list = document.getElementById('prayerList');
        const prayers = { "Fajr": "الفجر", "Dhuhr": "الظهر", "Asr": "العصر", "Maghrib": "المغرب", "Isha": "العشاء" };
        
        list.innerHTML = "";
        for (let key in prayers) {
            list.innerHTML += `<div class="prayer-time"><span>${prayers[key]}</span><span>${formatTime12(t[key])} <span class="bell" onclick="playAdhan()">🔔</span></span></div>`;
        }
    }

    const dhikrListDiv = document.getElementById('dhikrList');
    dhikrs.forEach((d, i) => { dhikrListDiv.innerHTML += `<div class="dhikr-item">${i+1}- ${d}</div>`; });

    getPrayers();
</script>
</body>
</html>
