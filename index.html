<!DOCTYPE html>
<html lang="ar">
<body style="margin:0; overflow:hidden; background:#1a1a2e; font-family:sans-serif; color:white; text-align:center;">

<button onclick="openSettings()" style="position:absolute; top:10px; right:10px; z-index:50; background:transparent; border:none; color:white; font-size:2em; cursor:pointer;">⚙️</button>

<div id="menu" style="position:absolute; width:100%; height:100%; background:#0f3460; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:20;">
    <h1 id="tTitle" style="font-size: 2.2em; margin-bottom: 15px;">تحدي الـ 100 نقطة</h1>
    <p id="tShape">اختر الشكل:</p>
    <div id="shapeBtns" style="display:flex; gap:15px; margin-bottom:20px;">
        <button onclick="selectShape(this, '⚽')" style="font-size: 1.8em; background-color:#2ecc71; border:none; border-radius:5px; cursor:pointer;">⚽</button>
        <button onclick="selectShape(this, '🏀')" style="font-size: 1.8em; border:none; border-radius:5px; cursor:pointer;">🏀</button>
        <button onclick="selectShape(this, '🏐')" style="font-size: 1.8em; border:none; border-radius:5px; cursor:pointer;">🏐</button>
    </div>
    <p id="tDiff">اختر الصعوبة:</p>
    <div id="diffBtns" style="display:flex; gap:15px; margin-bottom:30px;">
        <button onclick="setDiff(this, 12, 'سهل')" style="font-size: 1em; padding: 10px 20px; border:none; border-radius:5px; cursor:pointer;">سهل</button>
        <button onclick="setDiff(this, 16, 'متوسط')" style="font-size: 1em; padding: 10px 20px; background-color:#2ecc71; border:none; border-radius:5px; cursor:pointer;">متوسط</button>
        <button onclick="setDiff(this, 20, 'صعب')" style="font-size: 1em; padding: 10px 20px; border:none; border-radius:5px; cursor:pointer;">صعب</button>
    </div>
    <button id="tStart" onclick="start()" style="padding: 12px 40px; font-size: 1.4em; border-radius: 25px; cursor:pointer;">ابدأ التحدي</button>
</div>

<div id="settingsMenu" style="position:absolute; width:100%; height:100%; background:#1a1a2e; display:none; flex-direction:column; justify-content:center; align-items:center; z-index:40;">
    <h2 id="tSet">الإعدادات</h2>
    <div style="margin: 20px;">
        <label id="tLangLabel">اللغة: </label>
        <select id="langSelect" onchange="changeLang()">
            <option value="ar">العربية</option>
            <option value="en">English</option>
        </select>
    </div>
    <div style="margin: 20px;">
        <label id="tSizeLabel">حجم الخط: </label>
        <input type="range" id="sizeRange" min="20" max="60" value="30" oninput="changeFontSize(this.value)">
    </div>
    <button id="tSave" onclick="closeSettings()" style="padding:10px 30px; cursor:pointer;">حفظ والعودة</button>
</div>

<div id="gameOverMenu" style="position:absolute; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:30;">
    <h1 id="resultText" style="font-size: 2.5em; margin-bottom: 30px;">خسرت!</h1>
    <button id="tRestart" onclick="restart()" style="padding: 15px 40px; font-size: 1.2em; cursor:pointer;">إعادة اللعب</button>
    <button id="tBack" onclick="backToMenu()" style="padding: 15px 40px; font-size: 1.2em; background:#e74c3c; border:none; color:white; border-radius:5px; margin-top:10px; cursor:pointer;">العودة للشاشة الرئيسية</button>
</div>

<canvas id="c"></canvas>

<script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let pY = canvas.height - 120, vY = 0, isJumping = false, fontSize = 30;
    let obsX = 9999, obsW = 45, obsH = 70, baseSpeed = 20, speed = 20, score = 0, lastScore = 0, bestScore = localStorage.getItem('best') || 0;
    let gameRunning = false, shape = '⚽', lang = 'ar', diffName = 'متوسط', bonusText = "";
    let countdown = 10, showTimer = false;

    const trans = {
        ar: { title: "تحدي الـ 100 نقطة", shape: "اختر الشكل:", diff: "اختر الصعوبة:", start: "ابدأ التحدي", set: "الإعدادات", lang: "اللغة: ", size: "حجم الخط: ", save: "حفظ والعودة", restart: "إعادة اللعب", back: "العودة للشاشة الرئيسية", score: "النقاط: ", best: "أعلى: ", last: "آخر: ", diffLabel: "الصعوبة: ", lose: "خسرت! النتيجة: ", ready: "استعد: " },
        en: { title: "100 Points Challenge", shape: "Select Shape:", diff: "Select Difficulty:", start: "Start Challenge", set: "Settings", lang: "Language: ", size: "Font Size: ", save: "Save & Return", restart: "Restart", back: "Back to Menu", score: "Score: ", best: "Best: ", last: "Last: ", diffLabel: "Diff: ", lose: "Game Over! Score: ", ready: "Ready: " }
    };

    function openSettings() { document.getElementById("settingsMenu").style.display = "flex"; }
    function closeSettings() { document.getElementById("settingsMenu").style.display = "none"; }
    function changeFontSize(val) { fontSize = parseInt(val); }
    function changeLang() { 
        lang = document.getElementById('langSelect').value;
        document.getElementById('tTitle').innerText = trans[lang].title;
        document.getElementById('tShape').innerText = trans[lang].shape;
        document.getElementById('tDiff').innerText = trans[lang].diff;
        document.getElementById('tStart').innerText = trans[lang].start;
        document.getElementById('tSet').innerText = trans[lang].set;
        document.getElementById('tLangLabel').innerText = trans[lang].lang;
        document.getElementById('tSizeLabel').innerText = trans[lang].size;
        document.getElementById('tSave').innerText = trans[lang].save;
        document.getElementById('tRestart').innerText = trans[lang].restart;
        document.getElementById('tBack').innerText = trans[lang].back;
    }

    function selectShape(btn, s) { shape = s; Array.from(document.getElementById('shapeBtns').children).forEach(b => b.style.backgroundColor = ""); btn.style.backgroundColor = "#2ecc71"; }
    function setDiff(btn, s, n) { baseSpeed = s; speed = s; diffName = n; Array.from(document.getElementById('diffBtns').children).forEach(b => b.style.backgroundColor = ""); btn.style.backgroundColor = "#2ecc71"; }
    
    function start() { 
        document.getElementById("menu").style.display = "none"; 
        score = 0; speed = baseSpeed; obsX = 9999; gameRunning = true; showTimer = true; countdown = 10;
        let timerInterval = setInterval(() => {
            countdown--;
            if(countdown <= 0) { clearInterval(timerInterval); showTimer = false; obsX = canvas.width; }
        }, 1000);
        animate(); 
    }
    
    function backToMenu() { document.getElementById("gameOverMenu").style.display = "none"; document.getElementById("menu").style.display = "flex"; }
    function restart() { start(); document.getElementById("gameOverMenu").style.display = "none"; }

    function jump() { if (!isJumping && gameRunning && !showTimer) { isJumping = true; vY = -30; } }
    window.addEventListener("mousedown", jump);
    window.addEventListener("touchstart", (e) => { e.preventDefault(); jump(); });

    function animate() {
        if (!gameRunning) return;
        ctx.fillStyle = "#1a1a2e"; ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.font = "50px Arial"; ctx.fillText(shape, 80, pY + 45);
        
        if (!showTimer) {
            ctx.fillStyle = "#4ecca3"; ctx.fillRect(obsX, canvas.height - obsH - 20, obsW, obsH);
            obsX -= speed;
            if(obsX < -50) { 
                obsX = canvas.width + Math.random() * 600 + 400; 
                score++; 
                speed += 0.5; 
                if(score % 5 === 0) { bonusText = "+5"; setTimeout(() => bonusText = "", 800); }
                obsW = 40 + Math.random() * 50; 
                obsH = 60 + Math.random() * 80;
            }
        } else {
            ctx.fillStyle = "white"; ctx.font = "bold 100px Arial"; ctx.textAlign = "center";
            ctx.fillText(trans[lang].ready + countdown, canvas.width/2, canvas.height/2);
            ctx.textAlign = "left";
        }

        if (obsX < 125 && obsX > 75 && pY > (canvas.height - obsH - 75)) {
            gameRunning = false; lastScore = score; bestScore = Math.max(bestScore, score); 
            localStorage.setItem('best', bestScore);
            document.getElementById("gameOverMenu").style.display = "flex";
            document.getElementById("resultText").innerText = trans[lang].lose + score;
        }

        ctx.fillStyle = "white"; ctx.font = "bold " + fontSize + "px Arial";
        ctx.textAlign = "left";
        ctx.fillText(trans[lang].score + score, 50, fontSize);
        ctx.fillText(trans[lang].best + bestScore, 50, fontSize + 40);
        ctx.fillText(trans[lang].last + lastScore, 50, fontSize + 80);
        ctx.fillText(trans[lang].diffLabel + diffName, 50, fontSize + 120);
        
        if(bonusText) { 
            ctx.fillStyle = "#f1c40f"; ctx.font = "bold 150px Arial"; ctx.textAlign = "center";
            ctx.fillText(bonusText, canvas.width/2, canvas.height/2); ctx.textAlign = "left";
        }
        
        if(isJumping) { pY += vY; vY += 1.8; if(pY >= canvas.height - 120) { pY = canvas.height - 120; isJumping = false; vY = 0; } }
        requestAnimationFrame(animate);
    }
</script>
</body>
</html>
